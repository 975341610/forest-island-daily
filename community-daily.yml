name: Community Channel Daily

on:
  schedule:
    # 每天 01:00 UTC = 北京时间 09:00（错开 github 08:00 / game 08:30）
    - cron: '0 1 * * *'
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: "community-channel"
  cancel-in-progress: false

jobs:
  fetch-community:
    runs-on: ubuntu-latest
    if: github.actor != 'github-actions[bot]'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Fetch community posts/topics (RSS aggregate fallback) + archive snapshot
        run: |
          python scripts/fetchers/community_fetcher.py --max-posts 8 --max-topics 6 --lookback-hours 36

      - name: Commit channel data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/channels/community/community-today.json data/channels/community/archive/*.json data/channels/community/index.json
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "🌴 community channel: $(date -u +%Y-%m-%d)"
            git push
          fi
