name: GitHub Trending Daily

on:
  schedule:
    # 每天 00:00 UTC = 北京时间 08:00
    - cron: '0 0 * * *'
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: "github-trending"
  cancel-in-progress: false

jobs:
  fetch-github-trending:
    runs-on: ubuntu-latest
    if: github.actor != 'github-actions[bot]'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Fetch GitHub Trending Top 25
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          python scripts/fetchers/github_fetcher.py --top 25

      - name: Commit channel data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/channels/github/*.json
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "🐙 github trending: $(date -u +%Y-%m-%d)"
            git push
          fi
