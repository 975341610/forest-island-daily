name: Daily Fetch & Deploy

on:
  # 你 git push 到 main 后自动重新部署
  push:
    branches: [main]
    paths:
      - 'index.html'
      - 'github/**'
      - 'game/**'
      - 'community/**'
      - 'data/**'
      - 'scripts/**'
      - '.github/workflows/**'

  workflow_dispatch:
    inputs:
      today_url:
        description: '【可选】Mira 生成的 today.json 下载链接（留空则跑兜底抓取）'
        required: false
        default: ''

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  fetch-and-deploy:
    runs-on: ubuntu-latest
    # 跳过 bot 自己 push 触发的循环
    if: github.actor != 'github-actions[bot]'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      # 仅 workflow_dispatch 且明确传 URL 时才下载，否则走兜底脚本
      # push 触发时跳过抓取(已是最新数据)，但 merge/commit 步骤仍要执行
      - name: Fetch today's news (Mira → URL, fallback → local script)
        if: github.event_name != 'push'
        run: |
          INPUT_URL="${{ github.event.inputs.today_url }}"
          if [ -n "$INPUT_URL" ]; then
            echo "📥 downloading Mira-generated today.json"
            curl -sSL "$INPUT_URL" -o data/today.json
            head -c 200 data/today.json && echo ""
          else
            echo "🤖 running local fetch_news.py (fallback)"
            python scripts/fetch_news.py
          fi

      # 无论何种触发方式都要 merge:Mira push today.json 后也要重新归档+切分日期
      - name: Merge into archive
        run: python scripts/generate.py

      # 只 commit 由 generate.py 产生的归档/分日期/build_info 变更
      # 避免 today.json 自我循环 push(Mira 已经 push 过了)
      - name: Commit data changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/archive.json data/build_info.json data/2*.json
          if git diff --cached --quiet; then
            echo "No archive changes to commit"
          else
            git commit -m "📰 daily archive merge: $(date -u +%Y-%m-%d)"
            git push
          fi

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
