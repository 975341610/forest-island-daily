<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="theme-color" content="#E60012">
<title>游戏频道 · 森林小岛</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<style>
:root {
    --island-green:    #8ED16D;
    --island-deep:     #6BAE52;
    --island-blue:     #70CAD1;
    --island-yellow:   #F0DE65;
    --island-orange:   #F2A65A;
    --island-pink:     #F8B5C1;
    --island-brown:    #9E7453;
    --island-dark:     #5A4A3E;
    --island-bg:       #FEF9E7;
    --island-card-bg:  #FFFEF5;
    --island-radius:   26px;
    --island-radius-sm:16px;
    --island-border:   3px solid var(--island-brown);
    --island-shadow:   0 6px 0 var(--island-brown), 0 9px 20px rgba(94,74,62,0.18);
    --island-shadow-sm:0 3px 0 var(--island-brown), 0 4px 10px rgba(94,74,62,0.14);
    --game-red:        #E60012;
    --game-dark:       #2A1216;
}
* { box-sizing: border-box; }
body {
    margin:0; padding:0;
    font-family:-apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Hiragino Sans GB", sans-serif;
    background: var(--island-bg);
    background-image:
        radial-gradient(circle at 8% 12%, rgba(230,0,18,0.08) 0, transparent 22%),
        radial-gradient(circle at 92% 30%, rgba(112,202,209,0.16) 0, transparent 24%),
        radial-gradient(circle at 50% 90%, rgba(240,222,101,0.18) 0, transparent 26%);
    color: var(--island-dark); line-height:1.7; min-height:100vh;
}
.app { max-width:1180px; margin:0 auto; padding:16px 16px 90px; }

/* ===== 海报式 Hero 头图 ===== */
.hero {
    position:relative; overflow:hidden; border:var(--island-border); border-radius:var(--island-radius);
    box-shadow:var(--island-shadow); margin-bottom:26px;
    background: linear-gradient(135deg, var(--game-red) 0%, #B3000E 48%, var(--game-dark) 100%);
    padding:34px 28px 30px; color:#fff;
}
.hero::before { content:""; position:absolute; top:-60px; right:-40px; width:200px; height:200px; background:var(--island-yellow); border-radius:50%; opacity:0.28; }
.hero::after  { content:""; position:absolute; bottom:-70px; left:-50px; width:180px; height:180px; background:var(--island-blue); border-radius:50%; opacity:0.24; }
/* 撒在头图上的可爱小图标 */
.hero .confetti { position:absolute; font-size:26px; opacity:0.85; filter:drop-shadow(0 2px 0 rgba(0,0,0,.25)); pointer-events:none; }
.hero .c1 { top:18px; left:24px; transform:rotate(-12deg); }
.hero .c2 { top:60px; right:120px; font-size:20px; transform:rotate(10deg); }
.hero .c3 { bottom:24px; right:40px; font-size:30px; transform:rotate(-8deg); }
.hero .c4 { bottom:60px; left:140px; font-size:18px; transform:rotate(14deg); }
.nav-back { position:absolute; left:18px; top:18px; background:#fff; color:var(--game-red); border:2px solid var(--island-brown); border-radius:999px; padding:5px 14px; font-size:12px; font-weight:800; text-decoration:none; box-shadow:0 2px 0 var(--island-brown); z-index:3; }
.hero-inner { position:relative; z-index:2; text-align:center; }
.hero-kicker { display:inline-block; background:var(--island-yellow); color:var(--island-dark); font-weight:900; font-size:12px; letter-spacing:2px; padding:4px 16px; border-radius:999px; border:2px solid var(--island-brown); box-shadow:0 2px 0 var(--island-brown); margin-bottom:14px; }
.hero h1 { margin:0 0 8px; font-size:42px; font-weight:900; letter-spacing:2px; text-shadow:3px 3px 0 var(--game-dark); }
.hero .sub { margin:0 auto; font-size:15px; opacity:0.95; max-width:560px; }
.hero .stamp { display:inline-block; margin-top:16px; padding:5px 18px; background:#fff; color:var(--game-red); border-radius:999px; font-size:13px; font-weight:800; border:2px solid var(--island-brown); box-shadow:0 2px 0 var(--island-brown); }

/* ===== 锚点导航(吸顶) ===== */
.anchor-nav { position:sticky; top:0; z-index:20; display:flex; gap:10px; justify-content:center; flex-wrap:wrap;
    padding:10px; margin:0 -16px 26px; background:rgba(254,249,231,0.86); backdrop-filter:blur(6px); border-bottom:2px dashed rgba(158,116,83,0.35); }
.anchor-nav a { background:#fff; border:2px solid var(--island-brown); border-radius:999px; padding:7px 18px; font-size:14px; font-weight:800; color:var(--island-dark); text-decoration:none; box-shadow:0 2px 0 var(--island-brown); transition:transform .1s, background .15s; }
.anchor-nav a:hover { transform:translateY(-1px); }
.anchor-nav a.active { background:var(--game-red); color:#fff; }

/* ===== 可爱公告牌分区标题 ===== */
.board { position:relative; margin:34px 0 20px; text-align:center; }
.board-sign { display:inline-block; position:relative; background:var(--island-card-bg); border:var(--island-border);
    border-radius:var(--island-radius-sm); padding:10px 30px; box-shadow:var(--island-shadow-sm); }
.board-sign h2 { margin:0; font-size:22px; font-weight:900; color:var(--game-dark); display:flex; align-items:center; gap:10px; }
.board-sign .count { font-size:13px; font-weight:800; color:#fff; background:var(--game-red); border:2px solid var(--island-brown); border-radius:999px; padding:1px 10px; }
/* 公告牌两侧木桩 */
.board-sign::before, .board-sign::after { content:""; position:absolute; bottom:-14px; width:8px; height:16px; background:var(--island-brown); border-radius:0 0 4px 4px; }
.board-sign::before { left:26px; }
.board-sign::after  { right:26px; }

/* ===== 发售时间表:海报杂志卡 ===== */
.rel-mag { display:grid; grid-template-columns:repeat(2,1fr); gap:18px; }
.rel-card {
    position:relative; overflow:hidden; background:var(--island-card-bg); border:var(--island-border);
    border-radius:var(--island-radius); box-shadow:var(--island-shadow); display:flex; flex-direction:column;
}
.rel-poster { position:relative; padding:16px 18px; color:#fff; background:linear-gradient(135deg,var(--game-red),#7a000b); overflow:hidden; }
.rel-poster::after { content:""; position:absolute; right:-26px; top:-26px; width:90px; height:90px; border-radius:50%; background:#fff; opacity:0.12; }
.rel-ribbon { position:absolute; top:14px; right:-34px; transform:rotate(38deg); background:var(--island-yellow); color:var(--island-dark);
    font-size:11px; font-weight:900; padding:3px 38px; border-top:1px solid var(--island-brown); border-bottom:1px solid var(--island-brown); box-shadow:0 1px 3px rgba(0,0,0,.2); }
.rel-date-big { font-size:13px; font-weight:800; opacity:0.92; }
.rel-name { font-size:21px; font-weight:900; margin:4px 0 2px; text-shadow:2px 2px 0 rgba(0,0,0,.25); line-height:1.2; }
.rel-name .hype { margin-left:6px; font-size:16px; }
.rel-en { font-size:12px; font-weight:600; opacity:0.82; }
.rel-countdown { display:inline-block; margin-top:10px; background:#fff; color:var(--game-red); font-weight:900; font-size:13px; padding:3px 14px; border-radius:999px; border:2px solid var(--island-brown); }
.rel-body { padding:14px 18px 16px; }
.rel-studio { font-size:12px; color:var(--island-brown); font-weight:800; margin:0 0 6px; }
.rel-studio::before { content:"🏢 "; }
.rel-summary { font-size:14px; color:var(--island-dark); line-height:1.62; margin:0 0 12px; }
.plat-row { display:flex; flex-wrap:wrap; gap:6px; margin-bottom:8px; }
.plat-pill { font-size:11px; font-weight:800; padding:3px 11px; border-radius:999px; border:2px solid var(--island-brown); box-shadow:0 1px 0 var(--island-brown); }
.plat-PC { background:#1B2838; color:#fff; }
.plat-PS5 { background:#003791; color:#fff; }
.plat-Xbox { background:#107C10; color:#fff; }
.plat-Switch { background:#E60012; color:#fff; }
.plat-default { background:#fff; color:var(--island-dark); }
.rel-tags { display:flex; flex-wrap:wrap; gap:6px; }
.rel-genre { font-size:11px; background:var(--island-yellow); color:var(--island-dark); padding:2px 10px; border-radius:999px; font-weight:700; border:1px solid var(--island-brown); }

/* ===== 热点:杂志瀑布网格 ===== */
.hot-mag { columns:3; column-gap:18px; }
.hot-card { break-inside:avoid; margin-bottom:18px; background:var(--island-card-bg); border:var(--island-border);
    border-radius:var(--island-radius-sm); box-shadow:var(--island-shadow-sm); padding:16px 18px; position:relative; overflow:hidden; }
.hot-card::before { content:""; position:absolute; left:0; top:0; width:100%; height:6px; background:var(--game-red); }
.hot-tag { display:inline-block; font-size:11px; font-weight:900; color:#fff; background:var(--game-red); border:1.5px solid var(--island-brown); border-radius:999px; padding:2px 12px; margin:4px 0 8px; }
.hot-title { font-size:16px; font-weight:900; color:var(--game-dark); margin:0 0 7px; line-height:1.3; }
.hot-summary { font-size:13.5px; color:var(--island-dark); line-height:1.6; margin:0 0 12px; }
.hot-foot { display:flex; align-items:center; gap:8px; padding-top:10px; border-top:1px dashed rgba(158,116,83,0.35); }
.hot-source { font-size:12px; color:var(--island-brown); font-weight:700; }
.btn-src { margin-left:auto; display:inline-flex; align-items:center; gap:4px; font-size:12px; font-weight:800; padding:5px 13px; border-radius:999px; border:2px solid var(--island-brown); box-shadow:0 2px 0 var(--island-brown); text-decoration:none; background:var(--game-dark); color:#fff; transition:transform .12s; white-space:nowrap; }
.btn-src:hover { transform:translateY(-1px); }

/* ===== 厂商动向:紧凑公告条 ===== */
.studio-list { display:grid; grid-template-columns:repeat(2,1fr); gap:14px; }
.studio-card { display:flex; gap:12px; align-items:flex-start; background:var(--island-card-bg); border:var(--island-border);
    border-radius:var(--island-radius-sm); box-shadow:var(--island-shadow-sm); padding:14px 16px; position:relative; }
.studio-badge { flex:0 0 auto; width:46px; height:46px; border-radius:14px; background:linear-gradient(135deg,var(--island-deep),var(--island-green));
    border:2px solid var(--island-brown); box-shadow:0 2px 0 var(--island-brown); display:flex; align-items:center; justify-content:center; font-size:22px; }
.studio-main { flex:1; min-width:0; }
.studio-company { font-size:13px; font-weight:900; color:var(--island-deep); margin:0 0 2px; }
.studio-title { font-size:15px; font-weight:900; color:var(--game-dark); margin:0 0 5px; line-height:1.3; }
.studio-summary { font-size:13px; color:var(--island-dark); line-height:1.55; margin:0 0 8px; }
.studio-foot { display:flex; align-items:center; gap:8px; }
.studio-source { font-size:11.5px; color:var(--island-brown); font-weight:700; }
.studio-link { margin-left:auto; font-size:12px; font-weight:800; color:var(--game-red); text-decoration:none; }
.studio-link:hover { text-decoration:underline; }

.footer { text-align:center; margin-top:36px; padding:18px; color:var(--island-brown); font-size:12px; }
.footer a { color:var(--island-deep); text-decoration:none; font-weight:700; }
.loading { text-align:center; padding:50px 20px; color:var(--island-brown); font-size:14px; }

@media (max-width:900px) { .hot-mag { columns:2; } }
@media (max-width:640px) {
    .hero h1 { font-size:32px; }
    .rel-mag { grid-template-columns:1fr; }
    .hot-mag { columns:1; }
    .studio-list { grid-template-columns:1fr; }
    .hero .confetti { display:none; }
}
</style>
</head>
<body>
<div class="app">

    <!-- 海报式 Hero -->
    <header class="hero">
        <a href="../" class="nav-back">← 返回首页</a>
        <span class="confetti c1">🎮</span>
        <span class="confetti c2">🕹️</span>
        <span class="confetti c3">🎯</span>
        <span class="confetti c4">⭐</span>
        <div class="hero-inner">
            <span class="hero-kicker">FOREST ISLAND · GAME</span>
            <h1>🎮 游戏频道</h1>
            <p class="sub">重磅爆料 · 厂商动向 · 新游发售时间表 —— 一页看全今日游戏圈,大白话速读</p>
            <span class="stamp" id="dateStamp">📅 加载中…</span>
        </div>
    </header>

    <!-- 吸顶锚点导航 -->
    <nav class="anchor-nav" id="anchorNav">
        <a href="#sec-releases" class="active">📅 发售时间表</a>
        <a href="#sec-hot">🔥 今日热点</a>
        <a href="#sec-studios">🏢 厂商动向</a>
    </nav>

    <!-- 发售时间表 -->
    <section id="sec-releases">
        <div class="board"><div class="board-sign"><h2>📅 新游发售时间表 <span class="count" id="cntRel">0</span></h2></div></div>
        <div class="rel-mag" id="releaseList"><div class="loading">🌴 加载中…</div></div>
    </section>

    <!-- 今日热点 -->
    <section id="sec-hot">
        <div class="board"><div class="board-sign"><h2>🔥 今日游戏热点 <span class="count" id="cntHot">0</span></h2></div></div>
        <div class="hot-mag" id="hotList"><div class="loading">🌴 加载中…</div></div>
    </section>

    <!-- 厂商动向 -->
    <section id="sec-studios">
        <div class="board"><div class="board-sign"><h2>🏢 各大厂商动向 <span class="count" id="cntStu">0</span></h2></div></div>
        <div class="studio-list" id="studioList"><div class="loading">🌴 加载中…</div></div>
    </section>

    <div class="footer">
        <p>数据来源: 各游戏官方 · PlayStation / Xbox / 任天堂 · IGN / GameSpot 等 · 每日更新</p>
        <p><a href="../">← 返回森林小岛日报首页</a></p>
    </div>
</div>

<script>
const PLAT_KNOWN = ['PC','PS5','Xbox','Switch'];
const COMPANY_ICON = { '索尼':'🎮','微软':'🟢','任天堂':'🍄','Take-Two':'🌆','Rockstar':'🌆','卡普空':'🗡️','Capcom':'🗡️','Valve':'🚂','育碧':'🛡️','Ubisoft':'🛡️','EA':'⚽','网易':'🐼','腾讯':'🐧','Square':'💎','世嘉':'🦔','Epic':'🏗️' };
let DATA = null;

function esc(s){ return (s||'').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

function daysUntil(d){
    const m=d.match(/^(\d{4})-(\d{2})-(\d{2})$/); if(!m) return null;
    const t=new Date(+m[1],+m[2]-1,+m[3]), now=new Date(), t0=new Date(now.getFullYear(),now.getMonth(),now.getDate());
    return Math.round((t-t0)/86400000);
}
function fmtDate(d){
    const m=d.match(/^(\d{4})-(\d{2})-(\d{2})$/);
    if(!m) return { big:d, cd:'敬请期待' };
    const n=daysUntil(d);
    const cd = n>0 ? ('倒计时 '+n+' 天') : (n===0?'🎉 今日发售':'已发售');
    return { big:m[1]+'年'+m[2]+'月'+m[3]+'日', cd };
}
function companyIcon(name){ for(const k in COMPANY_ICON){ if(name.indexOf(k)>=0) return COMPANY_ICON[k]; } return '🏢'; }

async function load(){
    try {
        const r = await fetch('../data/channels/game/game-today.json?t='+Date.now());
        if(!r.ok) throw new Error('fetch fail');
        DATA = await r.json();
        document.getElementById('dateStamp').textContent = '📅 '+DATA.date;
        renderReleases(); renderHot(); renderStudios();
    } catch(e){
        document.getElementById('releaseList').innerHTML = '<div class="loading">😢 加载失败: '+e.message+'</div>';
    }
}

function renderReleases(){
    const list=(DATA.releases||[]); document.getElementById('cntRel').textContent=list.length;
    document.getElementById('releaseList').innerHTML = list.map(g=>{
        const f=fmtDate(g.date);
        const plats=(g.platforms||[]).map(p=>{const c=PLAT_KNOWN.includes(p)?'plat-'+p:'plat-default';return '<span class="plat-pill '+c+'">'+esc(p)+'</span>';}).join('');
        const genres=(g.genre||[]).map(t=>'<span class="rel-genre">#'+esc(t)+'</span>').join('');
        const hot = (g.hype||'').length>=6;
        return `<div class="rel-card">
            <div class="rel-poster">
                ${hot?'<div class="rel-ribbon">★ 必玩</div>':''}
                <div class="rel-date-big">📅 ${esc(f.big)}</div>
                <div class="rel-name">${esc(g.name_cn)}<span class="hype">${g.hype||''}</span></div>
                <div class="rel-en">${esc(g.name_en)}</div>
                <span class="rel-countdown">${esc(f.cd)}</span>
            </div>
            <div class="rel-body">
                <p class="rel-studio">${esc(g.studio)}</p>
                <p class="rel-summary">${esc(g.summary)}</p>
                <div class="plat-row">${plats}</div>
                <div class="rel-tags">${genres}</div>
            </div>
        </div>`;
    }).join('');
}

function renderHot(){
    const list=(DATA.hot||[]); document.getElementById('cntHot').textContent=list.length;
    document.getElementById('hotList').innerHTML = list.map(n=>`<div class="hot-card">
        <span class="hot-tag">${esc(n.category)}</span>
        <h3 class="hot-title">${esc(n.title)}</h3>
        <p class="hot-summary">${esc(n.summary)}</p>
        <div class="hot-foot">
            <span class="hot-source">📰 ${esc(n.source)}</span>
            ${n.url?'<a class="btn-src" href="'+n.url+'" target="_blank" rel="noopener">🔗 看原文</a>':''}
        </div>
    </div>`).join('');
}

function renderStudios(){
    const list=(DATA.studios||[]); document.getElementById('cntStu').textContent=list.length;
    document.getElementById('studioList').innerHTML = list.map(n=>`<div class="studio-card">
        <div class="studio-badge">${companyIcon(n.company)}</div>
        <div class="studio-main">
            <p class="studio-company">${esc(n.company)}</p>
            <h3 class="studio-title">${esc(n.title)}</h3>
            <p class="studio-summary">${esc(n.summary)}</p>
            <div class="studio-foot">
                <span class="studio-source">📰 ${esc(n.source)}</span>
                ${n.url?'<a class="studio-link" href="'+n.url+'" target="_blank" rel="noopener">看原文 →</a>':''}
            </div>
        </div>
    </div>`).join('');
}

// 锚点高亮
const navLinks=[...document.querySelectorAll('.anchor-nav a')];
const secs=navLinks.map(a=>document.querySelector(a.getAttribute('href')));
window.addEventListener('scroll',()=>{
    const y=window.scrollY+120; let cur=0;
    secs.forEach((s,i)=>{ if(s && s.offsetTop<=y) cur=i; });
    navLinks.forEach((a,i)=>a.classList.toggle('active',i===cur));
});

load();
</script>
</body>
</html>
